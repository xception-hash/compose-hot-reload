name: e2e

# Runs the on-device hot-reload gate (e2e/run.sh, 16 cases) on an Ubuntu KVM
# runner with an API 36 x86_64 AVD, matching the pinned local emulator. The host
# JDK is Temurin 21 (CI has no JBR); this is fine because all JVMTI/dex work runs
# on-device (ART), the host JVM only orchestrates the watch loop.

on:
  # Skip the ~13-min emulator run for docs-only changes. paths-ignore fails safe:
  # a commit that touches ANY non-doc path still runs. The workflow file itself is
  # not ignored, so changes to it are always validated.
  push:
    branches: [main]
    paths-ignore: &doc-paths
      - '**/*.md'
      - 'docs/**'
      - 'tasks/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore: *doc-paths

# Cancel superseded runs on the same ref (emulator jobs are slow).
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# Least privilege (T32 item 4): the job only checks out and uploads a log artifact on
# failure. upload-artifact needs no extra scope beyond the default token, so keep the top
# level read-only rather than the broader default GITHUB_TOKEN permissions.
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Hardware acceleration for the x86_64 emulator.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Temurin 21 — CI has no JBR; JBR-specific behavior is not required (see header).
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '21'

      # SDK components the harness needs:
      #  - build-tools;36.0.0 : the CLI resolves d8 at $ANDROID_HOME/build-tools/36.0.0/d8
      #  - ndk;28.2.13676358  : runtime-client builds the native agent .so (x86_64 in abiFilters)
      #  - cmake;3.22.1        : AGP-bundled default for the CMake build (min required 3.22)
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - name: Install pinned SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;28.2.13676358" \
            "cmake;3.22.1"

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      # scripts/icon-pixel.sh reads a screencap centre-pixel via Pillow for the
      # drawable/bitmap cases (11-13) — every other case uses uiautomator text
      # dumps. Pillow is the suite's only host-side Python dep and isn't in the
      # runner image; install via apt to sidestep PEP-668 externally-managed pip.
      - name: Install Pillow (icon-pixel screencap reader)
        run: sudo apt-get update && sudo apt-get install -y python3-pil

      # Boots the emulator, then runs the gate. emulator-up.sh sees the connected
      # device and short-circuits its own boot. Tee combined output to e2e-run.log
      # (run.sh deletes its mktemp watch log in its trap; on timeouts it tails that
      # log to stdout, so the tee captures it).
      - name: Run e2e gate
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 36
          arch: x86_64
          target: google_apis
          force-avd-creation: true
          emulator-options: -no-window -no-snapshot -no-audio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          disable-animations: true
          # Don't pipe into tee: a pipeline's exit code is tee's (0), which would
          # mask an e2e failure and keep the job green. Redirect, capture the code,
          # echo the log to the console, then exit with the real code.
          script: bash e2e/run.sh > e2e-run.log 2>&1; code=$?; cat e2e-run.log; exit $code

      - name: Upload e2e log
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: e2e-run-log
          path: e2e-run.log
          if-no-files-found: warn

      # Mirror run.sh's leaked-watcher kill: the CLI JVM is spawned by the Gradle
      # daemon, not our shell, so killing the wrapper alone leaks it.
      - name: Kill leaked CLI watchers
        if: always()
        run: pkill -f 'dev.hotreload.cli.MainKt' || true
